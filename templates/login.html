<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Links -->
    <link rel="stylesheet" href="/static/login.css">
    <link rel="stylesheet" href="/static/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Arimo:ital,wght@0,400..700;1,400..700&family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Manjari:wght@100;400;700&family=Passion+One:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Title Page -->
    <title>BagEats | Login</title>
    <link rel="icon" type="image/x-icon" href="/images/icon.png">
</head>
<body>
    <!-- Mobile Contents -->
    <div class="login-mobile">
        <div class="content-container content-gradient-top m-0">
            <div class="content">
                <img class="logo" src="/images/logo-1.png" alt="logo">
                <form class="login-form">
                    <label class="login-label" for="login-email">Email:</label>
                    <input class="login-input" type="email" name="login-email" required>
                    <label class="login-label label-password" for="login-password">Password:</label>
                    <input class="login-input" type="password" name="login-password" required>
                    <!-- <a class="forgot-pass" href="/templates/forgotPass.html">Forgot Password?</a> -->
                    <button class="login-submit" type="submit">Login</button>
                    <p class="login-link m-0">Don't have an account? <a href="/templates/register.html">Register</a></p>
                </form>
            </div>
        </div>
    </div>
    <!-- Desktop Contents -->
    <div class="login-desktop">
        <div class="content-container content-gradient m-0">
            <div class="content">
                <div class="login-base">
                    <div class="base-left w-100">
                        <img class="phone-img" src="/images/phone.png" alt="phone">
                    </div>
                    <div class="base-right w-100">
                        <img class="logo" src="/images/logo-2.png" alt="logo">
                        <form class="login-form">
                            <input class="login-input" type="email" name="login-email" placeholder="Email" required>
                            <input class="login-input" type="password" name="login-password" placeholder="Password" style="margin-top: 15px;" required>
                            <!-- <a class="forgot-pass" href="/templates/forgotPass.html">Forgot Password?</a> -->
                            <button class="login-submit" type="submit">Login</button>
                            <p class="login-link m-0">Don't have an account? <a href="/templates/register.html">Register</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
