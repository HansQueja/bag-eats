<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Links -->
    <link rel="stylesheet" href="/static/register.css"> 
    <link rel="stylesheet" href="/static/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Arimo:ital,wght@0,400..700;1,400..700&family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Manjari:wght@100;400;700&family=Passion+One:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Title Page -->
    <title>BagEats | Registration</title>
    <link rel="icon" type="image/x-icon" href="/images/icon.png">
</head>
<body>
    <!-- Mobile Contents -->
    <div class="register-mobile">
        <div class="content-container content-gradient-top m-0">
            <div class="content">
                <!-- Code Here -->
                <a class="register-logo" href="login.html">
                    <img class="reg-logo" src="/images/logo-1.png" alt="BagEats Logo">
                </a>
                <h1 class="reg-head">Registration</h1>
                <form class="input-area">
                    <label class="reg-label" for="reg-name">Full Name:</label>
                    <input class="reg-input" type="name" name="reg-name" required>
                    <label class="reg-label" for="reg-email">Email Address:</label>
                    <input class="reg-input" type="email" name="reg-email" required>
                    <label class="reg-label" for="reg-password">Password:</label>
                    <input class="reg-input" type="password" name="reg-password" required>
                    <label class="reg-label" for="reg-cpassword">Confirm Password:</label>
                    <input class="reg-input" type="cpassword" name="reg-cpassword" required>
                    <label class="reg-label" for="reg-age">Age:</label>
                    <input class="reg-input" type="age" name="reg-age" required>
                    <div class="div-height">
                        <label class="reg-label" for="reg-height">Height:</label>
                        <input class="reg-input" type="height" name="reg-height" required>
                    </div>
                    <div class="div-weight">
                        <label class="reg-label" for="reg-weight">Weight:</label>
                        <input class="reg-input" type="weight" name="reg-weight" required>
                    </div>
                    <button class="reg-confirm" type="confirm">REGISTER</button>
                </form>
            </div>
        </div>
    </div>
    <!-- Desktop Contents -->
    <div class="register-desktop">
        <div class="content-container content-gradient m-0">
            <div class="content">
                <!-- Code Here -->
                <a class="register-logo" href="login.html">
                    <img class="reg-logo" src="/images/logo-1.png" alt="BagEats Logo">
                </a>
                <div class="reg-form">
                <h1 class="reg-head">Registration</h1>
                <form class="input-area">
                    <div class="left-area">
                    <label class="reg-label name" for="reg-name">Full Name:</label>
                    <input class="reg-input iname" type="name" name="reg-name" required>
                    <label class="reg-label email" for="reg-email">Email Address:</label>
                    <input class="reg-input iemail" type="email" name="reg-email" required>
                    <label class="reg-label password" for="reg-password">Password:</label>
                    <input class="reg-input ipassword" type="password" name="reg-password" required>
                    <label class="reg-label cpassword" for="reg-cpassword">Confirm Password:</label>
                    <input class="reg-input icpassword" type="cpassword" name="reg-cpassword" required>
                    </div>
                    <div class="right-area">
                    <label class="reg-label age" for="reg-age">Age:</label>
                    <input class="reg-input iage" type="age" name="reg-age" required>
                    <label class="reg-label height" for="reg-height">Height:</label>
                    <input class="reg-input iheight" type="height" name="reg-height" required>
                    <label class="reg-label weight" for="reg-weight">Weight:</label>
                    <input class="reg-input iweight" type="weight" name="reg-weight" required>
                    </div>
                </form>
                <button class="reg-confirm" type="confirm">REGISTER</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
